services:
  api:
    build:
      context: .
      target: development
    command: npm run dev
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: development
      PORT: 3100
      MONGO_URI: mongodb://mongo:27017/campus_club
    volumes:
      - ./src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: campus_club
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mongo_data:
