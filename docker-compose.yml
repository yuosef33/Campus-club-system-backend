services:
  mailhog:
    image: mailhog/mailhog
    container_name: campus-club-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: .
    command: npm run dev
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      MONOLITHIC_MODE: "true"
      PORT: 4000
      MONOLITH_PORT: 4000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: Campus Club <no-reply@campusclub.local>
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      mailhog:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules

volumes:
  backend_node_modules:
