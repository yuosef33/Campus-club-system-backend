services:
  mongo:
    image: mongo:7
    container_name: campus-club-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailhog:
    image: mailhog/mailhog
    container_name: campus-club-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      target: development
    command: npm run dev
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      MONOLITHIC_MODE: "true"
      PORT: 4000
      MONOLITH_PORT: 4000
      MONGO_URI: mongodb://mongo:27017/campus_club
      MONGO_DB_NAME: campus_club
      TEST_MONGO_URI: mongodb://mongo:27017/campus_club_test
      TEST_DB_NAME: campus_club_test
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: Campus Club <no-reply@campusclub.local>
      ENABLE_DEFAULT_ADMIN_SEED: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      mongo:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules

volumes:
  mongo_data:
  backend_node_modules:
